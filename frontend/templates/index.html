<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PassCheck — Password Strength Analyser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="scan-line" aria-hidden="true"></div>

  <header class="site-header">
    <span class="logo">
      <span class="logo-bracket">[</span>PASSCHECK<span class="logo-bracket">]</span>
    </span>
    <span class="header-tag">v1.0 · password strength analyser</span>
    <div class="stat-pill" id="stat-pill">
      <span class="stat-dot"></span>
      <span id="stat-label">loading stats…</span>
    </div>
  </header>

  <main class="main">
    <section class="hero">
      <h1 class="hero-title">How strong<br>is your password?</h1>
      <p class="hero-sub">Entropy-based analysis against known wordlists, username patterns, and common attack vectors.</p>
    </section>

    <div class="card">
      <div class="field-group">
        <label class="field-label" for="username">Username <span class="field-hint">(optional — checks overlap)</span></label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">@</span>
          <input
            id="username"
            class="field-input"
            type="text"
            placeholder="your_username"
            autocomplete="username"
            spellcheck="false"
          />
        </div>
      </div>

      <div class="field-group">
        <label class="field-label" for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">#</span>
          <input
            id="password"
            class="field-input"
            type="password"
            placeholder="enter a password to analyse"
            autocomplete="off"
            spellcheck="false"
          />
          <button class="toggle-vis" id="toggle-vis" aria-label="Toggle password visibility" type="button">
            <svg id="eye-show" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg id="eye-hide" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button class="analyse-btn" id="analyse-btn" type="button">
        <span class="btn-text">Analyse</span>
        <span class="btn-spinner" aria-hidden="true"></span>
      </button>
    </div>

    <!-- Results (hidden until first check) -->
    <div class="results" id="results" aria-live="polite" hidden>

      <div class="score-row">
        <div class="score-block">
          <span class="score-number" id="score-number">—</span>
          <span class="score-unit">/100</span>
        </div>
        <div class="label-block">
          <span class="strength-label" id="strength-label">—</span>
          <span class="entropy-note" id="entropy-note">— bits entropy</span>
        </div>
      </div>

      <div class="meter-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="meter-wrap">
        <div class="meter-track">
          <div class="meter-fill" id="meter-fill"></div>
        </div>
        <div class="meter-ticks" aria-hidden="true">
          <span>0</span><span>25</span><span>50</span><span>75</span><span>100</span>
        </div>
      </div>

      <div class="checks-grid" id="checks-grid">
        <!-- Populated by JS -->
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <span>PassCheck runs entirely on your server — no data leaves your machine.</span>
  </footer>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
